services:
  - type: web
    name: meeple-cafe-ai-ordering-chatbot
    runtime: python
    plan: free

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt

    startCommand: uvicorn backend.app:app --host 0.0.0.0 --port $PORT

    autoDeploy: true

    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10

      - key: HOST
        value: 0.0.0.0

      - key: PORT
        value: 10000

      - key: DEBUG
        value: "False"

      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2

      - key: TOP_K
        value: "5"

      - key: SIMILARITY_THRESHOLD
        value: "0.35"
